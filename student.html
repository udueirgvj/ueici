<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة الطالب - المدرسة الإلكترونية</title>
    <!-- استيراد Firebase SDK (الإصدار 10.8.0) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, query, orderByChild, equalTo, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyCYnCu8VkoOAOhnJTZBVmSGcPSeKB4vCAM",
            authDomain: "tygggfs.firebaseapp.com",
            databaseURL: "https://tygggfs-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tygggfs",
            storageBucket: "tygggfs.firebasestorage.app",
            messagingSenderId: "532770652661",
            appId: "1:532770652661:web:855dadb2b6bfd5f5cf60bc",
            measurementId: "G-04LYXS03YS"
        };

        // تهيئة Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // عناصر الصفحة
        const searchInput = document.getElementById('schoolUsername');
        const searchBtn = document.getElementById('searchBtn');
        const resultsDiv = document.getElementById('results');
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');

        // دالة البحث
        async function searchSchool() {
            const username = searchInput.value.trim();
            if (!username) {
                showError('الرجاء إدخال اسم المستخدم');
                return;
            }

            // إظهار التحميل
            loadingDiv.style.display = 'block';
            resultsDiv.style.display = 'none';
            errorDiv.style.display = 'none';
            searchBtn.disabled = true;

            try {
                // البحث في قاعدة البيانات: نفترض أن لدينا عقدة schools وكل مدرسة لديها حقل username
                const schoolsRef = ref(database, 'schools');
                // استعلام للحصول على المدرسة التي تطابق username
                const schoolQuery = query(schoolsRef, orderByChild('username'), equalTo(username));
                const snapshot = await get(schoolQuery);

                loadingDiv.style.display = 'none';
                searchBtn.disabled = false;

                if (snapshot.exists()) {
                    // قد يكون هناك أكثر من مدرسة بنفس الاسم (نادر)، نأخذ أول واحدة
                    let schoolData = null;
                    let schoolId = null;
                    snapshot.forEach(childSnapshot => {
                        if (!schoolData) {
                            schoolData = childSnapshot.val();
                            schoolId = childSnapshot.key;
                        }
                    });

                    // عرض النتائج
                    displayResults(schoolData, schoolId);
                } else {
                    showError('لم يتم العثور على مدرسة بهذا الاسم');
                }
            } catch (err) {
                console.error('خطأ في البحث:', err);
                loadingDiv.style.display = 'none';
                searchBtn.disabled = false;
                showError('حدث خطأ أثناء البحث. الرجاء المحاولة لاحقاً.');
            }
        }

        // عرض نتائج البحث
        function displayResults(school, id) {
            resultsDiv.innerHTML = `
                <div class="school-card">
                    <h3>${school.name || 'مدرسة بدون اسم'}</h3>
                    <p><strong>اسم المستخدم:</strong> ${school.username || id}</p>
                    <p><strong>المرحلة:</strong> ${school.level || 'غير محدد'}</p>
                    <p><strong>العنوان:</strong> ${school.address || 'غير محدد'}</p>
                    <p><strong>المدير:</strong> ${school.principal || 'غير محدد'}</p>
                    <button class="join-btn" onclick="window.location.href='classroom.html?school=${id}'">دخول إلى المدرسة</button>
                </div>
            `;
            resultsDiv.style.display = 'block';
        }

        // عرض رسالة خطأ
        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
        }

        // ربط حدث البحث
        searchBtn.addEventListener('click', searchSchool);
        // البحث عند الضغط على Enter
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchSchool();
        });
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            direction: rtl;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0, 80, 100, 0.2);
            padding: 40px 30px;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        h1 {
            color: #0b4f6c;
            font-size: 2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h1 span {
            background: #ffb74d;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 1rem;
            color: #0b4f6c;
        }
        .welcome-message {
            background: #d9f0ec;
            padding: 20px;
            border-radius: 30px;
            margin-bottom: 30px;
            color: #0a3b4b;
            font-size: 1.2rem;
            border-right: 8px solid #2a9d8f;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
        .search-box {
            background: white;
            border-radius: 60px;
            padding: 5px 5px 5px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 120, 150, 0.15);
            border: 2px solid white;
            transition: all 0.3s;
        }
        .search-box:focus-within {
            border-color: #2a9d8f;
            box-shadow: 0 15px 35px rgba(42, 157, 143, 0.2);
        }
        .search-box input {
            flex: 1;
            border: none;
            padding: 18px 15px;
            font-size: 1.1rem;
            background: transparent;
            outline: none;
            color: #0a3b4b;
            font-weight: 500;
        }
        .search-box input::placeholder {
            color: #a0c4d0;
            font-weight: 400;
        }
        .search-box button {
            background: #2a9d8f;
            border: none;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-size: 1.5rem;
        }
        .search-box button:hover {
            background: #21867a;
            transform: scale(1.05);
        }
        .search-box button:disabled {
            background: #b0d9d3;
            cursor: not-allowed;
            transform: none;
        }
        #loading {
            display: none;
            text-align: center;
            margin: 30px 0;
            color: #0f6b5c;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #d0f0ec;
            border-top-color: #2a9d8f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #error {
            display: none;
            background: #fee4e2;
            color: #b33a3a;
            padding: 15px 20px;
            border-radius: 40px;
            margin: 20px 0;
            text-align: center;
            font-weight: 600;
            border-right: 8px solid #b33a3a;
        }
        #results {
            display: none;
            margin-top: 30px;
        }
        .school-card {
            background: white;
            border-radius: 35px;
            padding: 25px;
            box-shadow: 0 15px 30px rgba(42, 157, 143, 0.1);
            border: 2px solid rgba(42, 157, 143, 0.2);
            transition: transform 0.2s;
        }
        .school-card:hover {
            transform: translateY(-5px);
        }
        .school-card h3 {
            color: #0b4f6c;
            font-size: 1.8rem;
            margin-bottom: 15px;
            border-bottom: 3px solid #ffe0a3;
            padding-bottom: 10px;
            display: inline-block;
        }
        .school-card p {
            margin: 12px 0;
            color: #2d4e5c;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .school-card p strong {
            min-width: 100px;
            color: #0b4f6c;
        }
        .join-btn {
            background: #ffb74d;
            color: #0b4f6c;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: background 0.2s;
            border: 2px solid #ffa726;
        }
        .join-btn:hover {
            background: #ffa726;
        }
        .footer-note {
            margin-top: 30px;
            color: #6096a0;
            font-size: 0.9rem;
            text-align: center;
        }
        .footer-note i {
            color: #ffb74d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📖 مرحباً بك عزيزي الطالب <span>البحث عن المدرسة</span></h1>
        
        <div class="welcome-message">
            🔍 ابحث عن مدرستك باستخدام اسم المستخدم الذي تم إبلاغك به.
        </div>

        <!-- منطقة البحث -->
        <div class="search-box">
            <input type="text" id="schoolUsername" placeholder="أدخل اسم المستخدم الخاص بالمدرسة" autocomplete="off">
            <button id="searchBtn" aria-label="بحث">🔍</button>
        </div>

        <!-- مؤشر التحميل -->
        <div id="loading">
            <div class="spinner"></div>
            <p>جاري البحث...</p>
        </div>

        <!-- رسالة الخطأ -->
        <div id="error"></div>

        <!-- نتائج البحث -->
        <div id="results"></div>

        <div class="footer-note">
            <i>✨</i> إذا لم تجد مدرستك، تواصل مع إدارة المدرسة للحصول على اسم المستخدم الصحيح.
        </div>
    </div>
</body>
</html>
