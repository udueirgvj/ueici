<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء صف - المدرسة الإلكترونية</title>
    <!-- Firebase SDK (modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCYnCu8VkoOAOhnJTZBVmSGcPSeKB4vCAM",
            authDomain: "tygggfs.firebaseapp.com",
            databaseURL: "https://tygggfs-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tygggfs",
            storageBucket: "tygggfs.firebasestorage.app",
            messagingSenderId: "532770652661",
            appId: "1:532770652661:web:855dadb2b6bfd5f5cf60bc",
            measurementId: "G-04LYXS03YS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // الحصول على معرف المدرسة من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const schoolId = urlParams.get('id');

        if (!schoolId) {
            alert('معرف المدرسة غير موجود');
            window.location.href = 'index.html';
        }

        // عناصر الصفحة
        const subjectInput = document.getElementById('subject');
        const gradeRadios = document.querySelectorAll('input[name="grade"]');
        const selectedGradeSpan = document.getElementById('selectedGrade');
        const createBtn = document.getElementById('createBtn');
        const loadingDiv = document.getElementById('loading');
        const messageDiv = document.getElementById('message');
        const classesListDiv = document.getElementById('classesList');

        let selectedGrade = '1'; // افتراضي

        // تحديث الرقم المختار في النص
        function updateSelectedGrade() {
            selectedGradeSpan.textContent = selectedGrade;
        }

        // عند تغيير الراديو
        gradeRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                selectedGrade = e.target.value;
                updateSelectedGrade();
            });
        });

        // إظهار نافذة صغيرة لتغيير الرقم (prompt)
        selectedGradeSpan.addEventListener('click', () => {
            const newGrade = prompt('أدخل رقم الصف (من 1 إلى 6)', selectedGrade);
            if (newGrade && /^[1-6]$/.test(newGrade)) {
                selectedGrade = newGrade;
                // تحديد الراديو المطابق
                gradeRadios.forEach(radio => {
                    if (radio.value === newGrade) radio.checked = true;
                });
                updateSelectedGrade();
            } else {
                alert('الرجاء إدخال رقم صحيح بين 1 و 6');
            }
        });

        // دالة عرض الرسائل
        function showMessage(text, isError = true) {
            messageDiv.textContent = text;
            messageDiv.style.display = 'block';
            messageDiv.style.backgroundColor = isError ? '#ffddda' : '#e3f2fd';
            messageDiv.style.color = isError ? '#b34141' : '#0284c7';
        }

        // دالة تحميل وعرض الصفوف
        function loadClasses() {
            const classesRef = ref(db, `schools/${schoolId}/classes`);
            onValue(classesRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    // تحويل الكائن إلى مصفوفة
                    const classesArray = Object.entries(data).map(([id, val]) => ({
                        id,
                        ...val
                    }));
                    displayClasses(classesArray);
                } else {
                    classesListDiv.innerHTML = '<p class="no-data">🚫 لا توجد صفوف بعد، أنشئ أول صف.</p>';
                }
            }, (error) => {
                console.error(error);
                classesListDiv.innerHTML = '<p class="no-data error">حدث خطأ في تحميل الصفوف</p>';
            });
        }

        // عرض قائمة الصفوف
        function displayClasses(classes) {
            if (classes.length === 0) {
                classesListDiv.innerHTML = '<p class="no-data">🚫 لا توجد صفوف بعد، أنشئ أول صف.</p>';
                return;
            }

            let html = '';
            classes.forEach(cls => {
                html += `
                    <div class="class-item">
                        <span class="class-name">📘 ${cls.name || 'بدون اسم'} (الصف ${cls.grade || '?'})</span>
                        <div class="class-actions">
                            <button class="btn-small" onclick="window.location.href='class.html?schoolId=${schoolId}&classId=${cls.id}'">دخول</button>
                            <button class="btn-small danger" onclick="if(confirm('هل أنت متأكد من حذف هذا الصف؟')) deleteClass('${cls.id}')">حذف</button>
                        </div>
                    </div>
                `;
            });
            classesListDiv.innerHTML = html;
        }

        // دالة حذف الصف (تتطلب صلاحيات في القواعد)
        window.deleteClass = async (classId) => {
            if (!confirm('سيتم حذف الصف نهائياً، هل أنت متأكد؟')) return;
            try {
                const { ref: deleteRef, remove } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js");
                const classRef = ref(db, `schools/${schoolId}/classes/${classId}`);
                await remove(classRef);
                showMessage('✅ تم حذف الصف', false);
            } catch (error) {
                console.error(error);
                showMessage('فشل الحذف: ' + error.message, true);
            }
        };

        // إنشاء صف جديد
        createBtn.addEventListener('click', async () => {
            const subject = subjectInput.value.trim();

            if (!subject) {
                showMessage('الرجاء إدخال اسم المادة', true);
                return;
            }

            createBtn.disabled = true;
            loadingDiv.style.display = 'block';
            messageDiv.style.display = 'none';

            try {
                const classesRef = ref(db, `schools/${schoolId}/classes`);
                const newClassRef = push(classesRef);

                const classData = {
                    name: subject,
                    grade: selectedGrade,
                    createdAt: new Date().toISOString()
                };

                await set(newClassRef, classData);

                // تنظيف الحقل
                subjectInput.value = '';
                showMessage('✅ تم إنشاء الصف بنجاح', false);
            } catch (error) {
                console.error(error);
                showMessage('حدث خطأ: ' + error.message, true);
            } finally {
                createBtn.disabled = false;
                loadingDiv.style.display = 'none';
            }
        });

        // بدء التحميل
        loadClasses();
        updateSelectedGrade();
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #e6f7f0 0%, #c8f0e5 100%);
            min-height: 100vh;
            direction: rtl;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 50px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(20, 100, 90, 0.25);
        }
        h1 {
            color: #0b4f4a;
            margin-bottom: 30px;
            border-bottom: 3px solid #2a9d8f;
            padding-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h1 span {
            font-size: 1rem;
            background: #ffb74d;
            padding: 5px 15px;
            border-radius: 50px;
            color: #0b4f4a;
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #0b4f4a;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #d0e8e4;
            border-radius: 40px;
            font-size: 1rem;
            transition: 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #2a9d8f;
        }
        .grade-selector {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            background: #f0fcf9;
            padding: 15px 20px;
            border-radius: 40px;
            border: 2px solid #d0e8e4;
        }
        .grade-options {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .grade-options label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
            cursor: pointer;
            color: #0b4f4a;
        }
        .selected-badge {
            background: #2a9d8f;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            box-shadow: 0 4px 10px rgba(42, 157, 143, 0.3);
        }
        .selected-badge:hover {
            background: #1e7b6f;
            transform: scale(1.02);
        }
        #createBtn {
            background: #2a9d8f;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin: 25px 0;
            transition: 0.2s;
            box-shadow: 0 10px 20px rgba(42, 157, 143, 0.3);
        }
        #createBtn:hover {
            background: #1e7b6f;
        }
        #createBtn:disabled {
            background: #b0d9d3;
            cursor: not-allowed;
            box-shadow: none;
        }
        #loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        .spinner {
            width: 45px;
            height: 45px;
            border: 5px solid #d0f0ec;
            border-top-color: #2a9d8f;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #message {
            display: none;
            padding: 15px;
            border-radius: 40px;
            margin: 20px 0;
            text-align: center;
            font-weight: 600;
        }
        .classes-section {
            margin-top: 40px;
            border-top: 3px dashed #2a9d8f;
            padding-top: 30px;
        }
        .classes-section h2 {
            color: #0b4f4a;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #classesList {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .class-item {
            background: #f0fcf9;
            border: 2px solid #d0f0ec;
            border-radius: 50px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            transition: 0.2s;
        }
        .class-item:hover {
            border-color: #2a9d8f;
            background: white;
        }
        .class-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0b4f4a;
        }
        .class-actions {
            display: flex;
            gap: 10px;
        }
        .btn-small {
            background: #2a9d8f;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-small:hover {
            background: #1e7b6f;
        }
        .btn-small.danger {
            background: #b34141;
        }
        .btn-small.danger:hover {
            background: #8f2e2e;
        }
        .no-data {
            text-align: center;
            color: #6c9c9c;
            font-size: 1.1rem;
            padding: 30px;
            background: #f0fcf9;
            border-radius: 50px;
        }
        .no-data.error {
            color: #b34141;
            background: #ffddda;
        }
        .footer-note {
            text-align: center;
            margin-top: 30px;
            color: #6c9c9c;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 إنشاء صف جديد <span>إدارة الصفوف</span></h1>

        <!-- نموذج إنشاء الصف -->
        <div class="form-group">
            <label>اسم المادة / اسم الصف</label>
            <input type="text" id="subject" placeholder="مثال: رياضيات - الصف الخامس">
        </div>

        <div class="form-group">
            <label>اختر المرحلة / الصف الدراسي</label>
            <div class="grade-selector">
                <div class="grade-options">
                    <label><input type="radio" name="grade" value="1" checked> الأول</label>
                    <label><input type="radio" name="grade" value="2"> الثاني</label>
                    <label><input type="radio" name="grade" value="3"> الثالث</label>
                    <label><input type="radio" name="grade" value="4"> الرابع</label>
                    <label><input type="radio" name="grade" value="5"> الخامس</label>
                    <label><input type="radio" name="grade" value="6"> السادس</label>
                </div>
                <div class="selected-badge" id="selectedGrade">1</div>
            </div>
            <p style="margin-top: 8px; color: #3a6b6b; font-size: 0.9rem;">👉 انقر على الرقم لتغييره مباشرة</p>
        </div>

        <button id="createBtn">➕ إنشاء الصف</button>

        <div id="loading">
            <div class="spinner"></div>
            <p>جاري إنشاء الصف...</p>
        </div>

        <div id="message"></div>

        <!-- قائمة الصفوف الموجودة -->
        <div class="classes-section">
            <h2>📋 الصفوف الموجودة</h2>
            <div id="classesList">
                <!-- سيتم ملؤها ديناميكياً -->
                <p class="no-data">جاري تحميل الصفوف...</p>
            </div>
        </div>

        <div class="footer-note">
            * بعد إنشاء الصف، يظهر مباشرة في القائمة. يمكنك الدخول إليه أو حذفه.
        </div>
    </div>
</body>
</html>
